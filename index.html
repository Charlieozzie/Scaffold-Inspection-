<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scaffold Inspection Pro</title>
<style>
:root{--bg:#f8fafc;--card:#fff;--line:#dbe5ef;--text:#0f172a;--muted:#64748b;--pri:#0f172a;--danger:#b91c1c;--chip:#eef2f7}
*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
button,input,select,textarea{font:inherit} .wrap{max-width:1200px;margin:0 auto;padding:16px}
.top{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--line);z-index:5}.top .wrap{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.brand{font-size:22px;font-weight:700}.sub{font-size:13px;color:var(--muted)}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:16px}
.grid{display:grid;gap:16px}.g2{grid-template-columns:repeat(2,minmax(0,1fr))}.g3{grid-template-columns:repeat(3,minmax(0,1fr))}.g4{grid-template-columns:repeat(4,minmax(0,1fr))}
.btn{border:1px solid var(--line);background:#fff;padding:10px 14px;border-radius:12px;cursor:pointer}.btn.p{background:var(--pri);border-color:var(--pri);color:#fff}.btn.d{background:var(--danger);border-color:var(--danger);color:#fff}.btn.s{padding:8px 12px;font-size:13px}
.input,.select,.ta{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:12px;background:#fff}.ta{min-height:100px;resize:vertical}
.label{font-size:13px;font-weight:700;margin:0 0 6px 0;display:block}.muted{color:var(--muted)} .chip{display:inline-block;padding:6px 10px;border-radius:999px;background:var(--chip);border:1px solid var(--line);font-size:12px;text-transform:capitalize}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.item{border:1px solid var(--line);border-radius:16px;background:#fff;padding:14px;margin-bottom:12px;display:flex;justify-content:space-between;gap:12px}
.login{min-height:100vh;display:grid;place-items:center;padding:16px;background:linear-gradient(135deg,#f1f5f9,#e2e8f0)} .login .card{width:100%;max-width:460px}
.plot{border:2px solid #cbd5e1;border-radius:18px;background:#fff;min-height:420px;position:relative;overflow:hidden}
.plotgrid{position:absolute;inset:0;background-image:linear-gradient(to right, rgba(148,163,184,.22) 1px, transparent 1px),linear-gradient(to bottom, rgba(148,163,184,.22) 1px, transparent 1px);background-size:56px 56px}
.axisY{position:absolute;left:0;top:0;bottom:42px;width:70px;border-right:2px solid #cbd5e1;background:#f8fafc;display:flex;flex-direction:column;justify-content:space-between;padding:10px 8px;font-size:11px;font-weight:700}
.axisX{position:absolute;left:70px;right:0;bottom:0;height:42px;border-top:2px solid #cbd5e1;background:#f8fafc;display:flex;align-items:center;justify-content:space-between;padding:0 10px;font-size:11px;font-weight:700}
.area{position:absolute;left:70px;right:0;top:0;bottom:42px}.pin{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:6px;background:none;border:none}
.dot{width:18px;height:18px;border-radius:50%;background:#dc2626;border:4px solid #fecaca;box-shadow:0 6px 18px rgba(0,0,0,.2)} .active .dot{background:#2563eb;border-color:#bfdbfe}
.pinlabel{font-size:11px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:6px 8px;font-weight:700;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.modalback{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;padding:16px}.show{display:flex}.modal{background:#fff;border-radius:20px;border:1px solid var(--line);max-width:720px;width:100%;max-height:88vh;overflow:auto}
.head{font-size:18px;font-weight:700;padding:18px;border-bottom:1px solid var(--line)}.body{padding:18px}
@media(max-width:900px){.g4,.g3,.g2{grid-template-columns:1fr}.axisY{width:58px}.axisX{left:58px}.area{left:58px}}
</style>
</head>
<body>
<div id="app"></div>
<div id="mb" class="modalback"><div class="modal"><div id="mh" class="head"></div><div id="mc" class="body"></div></div></div>
<script>
const KEY="scaffold_inspection_single_file_v3";
const TYPES=[["tube_fitting","Tube & Fitting"],["system","System Scaffold"],["podium","Low Level Platform / Podium"],["ladder_staircase","Ladder / Staircase"]];
const checklists={
tube_fitting:["Scaffold founded on suitable base","Base plates present","Sole boards adequate and in good condition","Standards plumb and secure","Ledgers level and secure","Transoms correctly fitted","Bracing adequate","Ties correctly installed","Platforms fully boarded","Boards in good condition","No excessive gaps in platforms","Guardrails fitted correctly","Midrails fitted","Toe boards fitted","Brickguards / mesh fitted where required","Access provided safely","Ladder secured and extends correctly","Stair access safe where applicable","Loading bays suitable and marked","Scaffold tag / inspection status displayed","No obvious damage / missing fittings","Housekeeping satisfactory","Overall safe for use"],
system:["Manufacturer system components used correctly","Base jacks / base plates adequate","Standards vertical","Ledgers / horizontals secure","Diagonal bracing complete","Decking installed correctly","Deck units locked / secured","Guardrails complete","Toe boards complete","Ties / anchors adequate","Access bays safe","Ladder / stair units correctly installed","Trapdoors safe and operational","Loading bays safe and labelled","Edge protection complete","System components undamaged","No missing locking pins/clips","Manufacturer guidance followed","Scaffold tag present","Overall safe for use"],
podium:["Unit assembled to manufacturer instructions","Wheels / castors in good condition","Brakes applied","Platform deck secure","Guardrails fitted","Gates / chains functional if applicable","Platform free of defects","Ground surface level and firm","Outriggers fitted where required","No overloading risk","Safe access onto platform","Overall safe for use"],
ladder_staircase:["Ladder / stair unit suitable for task","Correct angle / position","Secured top and bottom where required","Non-slip feet in good condition","Treads / rungs clean and undamaged","Handrails fitted where required","Landing area clear","Access / egress unobstructed","Extension above landing adequate where applicable","No visible defects","Used only for permitted access purpose","Overall safe for use"]
};
function uid(p="id"){return `${p}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2,8)}`}
function tl(v){return TYPES.find(x=>x[0]===v)?.[1]||v}
function esc(v){return String(v??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function buildChecklist(items){return items.map(i=>({id:uid("c"),item:i,response:"yes",severity:"low",comment:""}))}
function fmt(v){const d=new Date(v);return isNaN(d)?"-":d.toLocaleString()}
function derive(list){if(list.some(x=>x.response==="no"&&x.severity==="critical"))return"fail";if(list.some(x=>x.response==="no"))return"conditional";return"pass"}
function sfrom(r){return r==="pass"?"passed":r==="conditional"?"restricted_use":"failed"}
function seed(){const now=new Date().toISOString();return{
users:[{id:"u1",name:"Ian Inspector",email:"inspector@test.com",password:"demo123",role:"inspector",employeeId:"INSP-001",active:true},{id:"u2",name:"Maya Manager",email:"manager@test.com",password:"demo123",role:"manager",employeeId:"MGR-001",active:true},{id:"u3",name:"Clara Client",email:"client@test.com",password:"demo123",role:"client",employeeId:"CL-001",active:true}],
sites:[{id:"site1",name:"London West Yard",clientName:"ABC Developments",area:"West London",address:"1 Yard Street, London",lat:51.5079,lng:-0.1276,createdAt:now},{id:"site2",name:"Dockside Project",clientName:"Harbour Build",area:"Canary Wharf",address:"22 Dock Road, London",lat:51.5055,lng:-0.0235,createdAt:now}],
scaffolds:[{id:"sc1",name:"Block A Front Elevation",scaffoldType:"tube_fitting",siteId:"site1",area:"Zone A",description:"Front access scaffold",status:"passed",lat:51.5079,lng:-0.1276,createdBy:"u2",assignedInspectorId:"u1",attachedUserId:"INSP-001",createdAt:now,updatedAt:now},{id:"sc2",name:"Dock Stair Tower",scaffoldType:"system",siteId:"site2",area:"Tower 3",description:"Access tower",status:"restricted_use",lat:51.5055,lng:-0.0235,createdBy:"u2",assignedInspectorId:"u1",attachedUserId:"MGR-001",createdAt:now,updatedAt:now}],
inspections:[{id:"in1",scaffoldId:"sc1",inspectionType:"tube_fitting",inspectorUserId:"u1",attachedUserId:"INSP-001",overallResult:"pass",notes:"All in good condition",defectsSummary:"",correctiveActions:"",weather:"Dry",gpsLat:51.5079,gpsLng:-0.1276,photos:[],checklist:buildChecklist(checklists.tube_fitting),createdAt:now,updatedAt:now,deleted:false},{id:"in2",scaffoldId:"sc2",inspectionType:"system",inspectorUserId:"u2",attachedUserId:"MGR-001",overallResult:"conditional",notes:"Minor issues with signage",defectsSummary:"Missing one sign",correctiveActions:"Replace loading bay label",weather:"Cloudy",gpsLat:51.5055,gpsLng:-0.0235,photos:[],checklist:buildChecklist(checklists.system),createdAt:now,updatedAt:now,deleted:false}],
preferences:{u1:{rememberAttachedUserId:true,lastAttachedUserId:"INSP-001"},u2:{rememberAttachedUserId:true,lastAttachedUserId:"MGR-001"}},
clientAccess:{u3:["site1","site2"]}
}}
const state={store:load(),user:null,tab:"dashboard",selectedInspection:null,editingInspection:null,selectedScaffold:"",editingPin:null,draft:{lat:"",lng:""},search:""};
function load(){try{const raw=localStorage.getItem(KEY);return raw?{...seed(),...JSON.parse(raw)}:seed()}catch(e){return seed()}}
function save(){localStorage.setItem(KEY,JSON.stringify(state.store))}
function vsites(){if(!state.user)return[];if(state.user.role==="client")return state.store.clientAccess[state.user.id]||[];return state.store.sites.map(s=>s.id)}
function vscaffolds(){return state.store.scaffolds.filter(s=>vsites().includes(s.siteId))}
function vinspections(){let items=state.store.inspections.filter(i=>!i.deleted&&vscaffolds().some(s=>s.id===i.scaffoldId));if(state.user?.role==="inspector")items=items.filter(i=>i.inspectorUserId===state.user.id);if(state.search){const q=state.search.toLowerCase();items=items.filter(i=>{const s=gsc(i.scaffoldId);return(s?.name||"").toLowerCase().includes(q)||(s?.area||"").toLowerCase().includes(q)||i.overallResult.toLowerCase().includes(q)})}return items.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt))}
function gsc(id){return state.store.scaffolds.find(x=>x.id===id)} function gsi(id){return state.store.sites.find(x=>x.id===id)} function gus(id){return state.store.users.find(x=>x.id===id)} function gin(id){return state.store.inspections.find(x=>x.id===id)}
function app(){document.getElementById("app").innerHTML=state.user?screenApp():screenLogin();bind()}
function screenLogin(){return `<div class="login"><div class="card"><h3>Scaffold Inspection Pro</h3><div class="muted" style="margin-bottom:14px">Single-file GitHub Pages version</div><label class="label">Email</label><input id="email" class="input" value="manager@test.com"><div style="height:10px"></div><label class="label">Password</label><input id="pw" class="input" type="password" value="demo123"><div id="err" class="error" style="margin-top:10px"></div><div style="height:10px"></div><button id="login" class="btn p" style="width:100%">Sign In</button><div style="height:10px"></div><div class="muted" style="font-size:12px">manager@test.com / demo123 • inspector@test.com / demo123 • client@test.com / demo123</div></div></div>`}
function screenApp(){const nav=state.user.role==="manager"?["dashboard","inspections","map","scaffolds","sites","users"]:state.user.role==="client"?["dashboard","inspections","map"]:["dashboard","inspections","map","scaffolds"];return `<div class="top"><div class="wrap"><div><div class="brand">Scaffold Inspection Pro</div><div class="sub">${state.user.role} portal</div></div><div class="row">${nav.map(n=>`<button class="btn s ${state.tab===n?"p":""}" data-nav="${n}">${n}</button>`).join("")}<span class="chip">${state.user.role}</span><span class="muted">${esc(state.user.name)}</span><button id="logout" class="btn s">Logout</button></div></div></div><div class="wrap">${main()}</div>`}
function stats(){const sc=vscaffolds(),ins=vinspections();return{a:sc.length,p:ins.filter(i=>i.overallResult==="pass").length,c:ins.filter(i=>i.overallResult==="conditional").length,f:ins.filter(i=>i.overallResult==="fail").length}}
function main(){if(state.editingInspection)return form(state.editingInspection==="__new__"?null:gin(state.editingInspection));if(state.selectedInspection)return detail(gin(state.selectedInspection));if(state.tab==="dashboard"){const st=stats();return `<div class="grid g4"><div class="card"><div class="muted">Active scaffolds</div><div style="font-size:28px;font-weight:700">${st.a}</div></div><div class="card"><div class="muted">Passed inspections</div><div style="font-size:28px;font-weight:700">${st.p}</div></div><div class="card"><div class="muted">Conditional</div><div style="font-size:28px;font-weight:700">${st.c}</div></div><div class="card"><div class="muted">Failed inspections</div><div style="font-size:28px;font-weight:700">${st.f}</div></div></div><div style="height:16px"></div>${mapView()}`;} if(state.tab==="inspections")return inspectionsView(); if(state.tab==="map")return mapView(); if(state.tab==="scaffolds")return scaffoldsView(); if(state.tab==="sites")return sitesView(); if(state.tab==="users")return usersView(); return ""}
function inspectionsView(){const items=vinspections();return `<div class="card"><input id="search" class="input" placeholder="Search scaffold, area or result" value="${esc(state.search)}"></div>${items.map(i=>{const s=gsc(i.scaffoldId),u=gus(i.inspectorUserId);return `<div class="item"><div><div style="font-weight:700">${esc(s?.name||"Unknown scaffold")}</div><div class="muted" style="font-size:13px">${esc(tl(i.inspectionType))} • ${esc(u?.name||"-")} • ${fmt(i.createdAt)}</div><div class="row" style="margin-top:8px"><span class="chip">${i.overallResult}</span><span class="chip">${esc(s?.area||"No area")}</span></div></div><div class="row"><button class="btn s" data-open="${i.id}">Open</button>${state.user.role==="manager"?`<button class="btn s" data-edit="${i.id}">Edit</button><button class="btn s d" data-del="${i.id}">Delete</button>`:""}</div></div>`}).join("")||`<div class="card">No inspections found.</div>`}`}
function detail(i){const s=gsc(i.scaffoldId),site=s?gsi(s.siteId):null,u=gus(i.inspectorUserId);return `<div class="card"><div class="row" style="justify-content:space-between"><h3>Inspection Detail</h3><div class="row"><button class="btn s" data-pdf="${i.id}">Export PDF</button>${state.user.role==="manager"?`<button class="btn s" data-edit="${i.id}">Edit</button><button class="btn s d" data-del="${i.id}">Delete</button>`:""}<button id="back" class="btn s">Back</button></div></div><div style="height:10px"></div><div class="grid g2"><div><b>Scaffold:</b> ${esc(s?.name||"-")}</div><div><b>Type:</b> ${esc(tl(i.inspectionType))}</div><div><b>Site:</b> ${esc(site?.name||"-")}</div><div><b>Area:</b> ${esc(s?.area||"-")}</div><div><b>Inspector:</b> ${esc(u?.name||"-")}</div><div><b>Attached user ID:</b> ${esc(i.attachedUserId||"-")}</div><div><b>Result:</b> ${esc(i.overallResult)}</div><div><b>Date:</b> ${fmt(i.createdAt)}</div><div><b>Weather:</b> ${esc(i.weather||"-")}</div><div><b>GPS:</b> ${i.gpsLat!=null?`${i.gpsLat.toFixed(5)}, ${i.gpsLng.toFixed(5)}`:"-"}</div></div></div><div class="card"><h3>Notes</h3><div><b>Defects:</b> ${esc(i.defectsSummary||"None recorded")}</div><div><b>Corrective actions:</b> ${esc(i.correctiveActions||"None recorded")}</div><div><b>Notes:</b> ${esc(i.notes||"None recorded")}</div></div><div class="card"><h3>Checklist Responses</h3>${i.checklist.map(c=>`<div class="item"><div>${esc(c.item)}</div><div class="row"><span class="chip">${esc(c.response)}</span>${c.comment?`<span class="muted">${esc(c.comment)}</span>`:""}</div></div>`).join("")}</div>`}
function form(existing){const scaffold=existing?gsc(existing.scaffoldId):gsc(state.selectedScaffold); if(!scaffold)return `<div class="card">No scaffold selected.</div>`; const pref=state.store.preferences[state.user.id]||{lastAttachedUserId:state.user.employeeId||""}; const checklist=existing?existing.checklist:buildChecklist(checklists[scaffold.scaffoldType]||[]); return `<div class="card"><h3>${existing?"Edit":"New"} Inspection</h3><div class="muted">${esc(scaffold.name)} • ${esc(tl(scaffold.scaffoldType))}</div><div style="height:12px"></div><form id="f"><input type="hidden" name="iid" value="${existing?.id||""}"><input type="hidden" name="sid" value="${scaffold.id}"><div class="grid g2"><div><label class="label">Attached user ID</label><select name="attached" class="select"><option value="">None</option>${state.store.users.filter(u=>["inspector","manager"].includes(u.role)).map(u=>`<option value="${esc(u.employeeId||u.id)}" ${((existing?.attachedUserId)||pref.lastAttachedUserId)===(u.employeeId||u.id)?"selected":""}>${esc(u.name)} (${esc(u.employeeId||u.id)})</option>`).join("")}</select></div><div><label class="label">Weather</label><input name="weather" class="input" value="${esc(existing?.weather||"")}" placeholder="Dry / Wet / Windy"></div><div><label class="label">GPS</label><div class="row"><input id="gpsd" class="input" readonly value="${existing?.gpsLat!=null?`${existing.gpsLat.toFixed(5)}, ${existing.gpsLng.toFixed(5)}`:(scaffold.lat!=null?`${Number(scaffold.lat).toFixed(5)}, ${Number(scaffold.lng).toFixed(5)}`:"")}"><button type="button" id="gps" class="btn">Capture</button></div><input type="hidden" name="glat" value="${existing?.gpsLat??scaffold.lat??""}"><input type="hidden" name="glng" value="${existing?.gpsLng??scaffold.lng??""}"></div></div><div style="height:14px"></div>${checklist.map((c,i)=>`<div class="card"><div style="font-weight:700">${esc(c.item)}</div><div class="row" style="margin-top:8px">${["yes","no","na"].map(v=>`<label class="chip"><input type="radio" name="r_${i}" value="${v}" ${c.response===v?"checked":""}> ${v.toUpperCase()}</label>`).join("")}</div><div class="grid g2" style="margin-top:10px"><div><label class="label">Severity</label><select class="select" name="sev_${i}"><option value="low" ${c.severity==="low"?"selected":""}>Low</option><option value="medium" ${c.severity==="medium"?"selected":""}>Medium</option><option value="high" ${c.severity==="high"?"selected":""}>High</option><option value="critical" ${c.severity==="critical"?"selected":""}>Critical</option></select></div><div><label class="label">Comment</label><input class="input" name="com_${i}" value="${esc(c.comment||"")}"></div></div></div>`).join("")}<div class="card"><label class="label">Photo upload</label><input id="photos" type="file" class="input" accept="image/*" multiple><div id="pgrid" class="grid g3" style="margin-top:12px">${(existing?.photos||[]).map(p=>`<img src="${p.dataUrl}" style="width:100%;height:160px;object-fit:cover;border-radius:14px;border:1px solid var(--line)">`).join("")}</div></div><div class="grid g2"><div><label class="label">Defects summary</label><textarea name="def" class="ta">${esc(existing?.defectsSummary||"")}</textarea></div><div><label class="label">Corrective actions</label><textarea name="cor" class="ta">${esc(existing?.correctiveActions||"")}</textarea></div></div><div><label class="label">Notes</label><textarea name="notes" class="ta">${esc(existing?.notes||"")}</textarea></div><div class="row" style="justify-content:space-between"><div class="muted">Result is calculated on save</div><div class="row"><button type="button" id="cancel" class="btn">Cancel</button><button class="btn p">Save Inspection</button></div></div></form></div>`}
function mapView(){const sc=vscaffolds().filter(s=>s.lat!=null&&s.lng!=null), b=bounds(sc), lr=Math.max(b.maxLat-b.minLat,.00001), gr=Math.max(b.maxLng-b.minLng,.00001), yt=Array.from({length:5},(_,i)=>(b.maxLat-(lr*i/4)).toFixed(4)), xt=Array.from({length:5},(_,i)=>(b.minLng+(gr*i/4)).toFixed(4)); return `<div class="card"><h3>Map Overview</h3><div class="muted">Canvas-safe coordinate plot with editable pins.</div><div style="height:12px"></div><div class="grid" style="grid-template-columns:minmax(0,1fr) 320px;align-items:start"><div class="plot"><div class="plotgrid"></div><div class="axisY">${yt.map(t=>`<div>${t}</div>`).join("")}</div><div class="axisX">${xt.map(t=>`<div>${t}</div>`).join("")}</div><div class="area">${sc.map((s,i)=>{const p=pt(state.editingPin===s.id&&state.draft.lat!==""?Number(state.draft.lat):s.lat,state.editingPin===s.id&&state.draft.lng!==""?Number(state.draft.lng):s.lng,b);return `<button class="pin ${state.editingPin===s.id?"active":""}" style="left:${p.left};top:${p.top}" data-pin="${s.id}"><div class="dot"></div><div class="pinlabel">${i+1}. ${esc(s.name)}</div></button>`}).join("")}</div></div><div class="card">${sc.map((s,i)=>`<button class="item" style="width:100%;text-align:left;cursor:pointer" data-pin="${s.id}"><div><div style="font-weight:700">${i+1}. ${esc(s.name)}</div><div class="muted" style="font-size:12px">${s.lat.toFixed(5)}, ${s.lng.toFixed(5)}</div></div><span class="chip">pin</span></button>`).join("")||"No pins"}</div></div>${["manager","inspector"].includes(state.user.role)&&state.editingPin?movePanel():""}</div>`}
function movePanel(){const s=gsc(state.editingPin), b=bounds(vscaffolds().filter(x=>x.lat!=null&&x.lng!=null)), p=pt(Number(state.draft.lat||s.lat),Number(state.draft.lng||s.lng),b);return `<div style="height:16px"></div><div class="card"><h3>Move pin: ${esc(s.name)}</h3><button id="moveplot" class="plot" style="width:100%;min-height:260px;background:#fff;text-align:left"><div class="plotgrid"></div><div class="axisY"><div>N</div><div>S</div></div><div class="axisX"><div>W</div><div>E</div></div><div class="area"><div class="pin active" style="left:${p.left};top:${p.top}"><div class="dot"></div><div class="pinlabel">${esc(s.name)}</div></div></div></button><div style="height:12px"></div><div class="grid g2"><div><label class="label">Latitude</label><input id="dlat" class="input" value="${esc(state.draft.lat||String(s.lat))}"></div><div><label class="label">Longitude</label><input id="dlng" class="input" value="${esc(state.draft.lng||String(s.lng))}"></div></div><div style="height:10px"></div><div class="row"><button class="btn s" data-nudge="lat:0.0001">North</button><button class="btn s" data-nudge="lat:-0.0001">South</button><button class="btn s" data-nudge="lng:-0.0001">West</button><button class="btn s" data-nudge="lng:0.0001">East</button></div><div style="height:10px"></div><div class="row"><button id="savepin" class="btn p">Save position</button><button id="cancelpin" class="btn">Cancel</button></div></div>`}
